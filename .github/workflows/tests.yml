name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.10"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Clean previous Cython builds
        run: |
          rm -rf build
          find . -name "*.so" -delete
          find . -name "*.c" -delete
          find . -name "*.cpp" -delete

      - name: Build Cython extensions
        run: |
          uv run pip install -e .

      - name: Verify package import
        run: |
          uv run python -c "from scheduling_simulator.core import Cluster, Job, Machine; print('Cython import OK')"

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=scheduling_simulator \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Add coverage summary to GitHub
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both

      - name: Publish coverage summary
        run: |
          cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
