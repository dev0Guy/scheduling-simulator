
name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Clean previous build artifacts
        run: |
          rm -rf build
          rm -rf src/*.egg-info
          rm -rf src/scheduling_simulator.egg-info
          find src -name "*.so" -delete
          find src -name "*.c" -delete
          find src -name "*.cpp" -delete

      - name: Verify NumPy installation
        run: |
          uv run python - <<'PY'
          import numpy
          print("NumPy version:", numpy.__version__)
          print("NumPy location:", numpy.__file__)
          PY

      - name: Build Cython extensions
        run: |
          uv run python setup.py build_ext --inplace

      - name: Verify compiled package
        run: |
          uv run python - <<'PY'
          from scheduling_simulator.core import Cluster, Job, Machine
          print("Cython extensions imported successfully.")
          PY

      - name: Run tests with coverage
        run: |
          uv run pytest \
            -v \
            --cov=scheduling_simulator \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both

      - name: Publish summary
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
