name: Tests and Coverage

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.10"

    steps:

      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4


      # -----------------------------
      # Python
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}


      # -----------------------------
      # uv
      # -----------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false


      # -----------------------------
      # Remove old/corrupt environments
      # -----------------------------
      - name: Clean build environment
        run: |
          rm -rf .venv
          rm -rf ~/.cache/uv
          rm -rf ~/.cache/pip


      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          uv sync --dev --no-cache


      # -----------------------------
      # Verify NumPy works
      # -----------------------------
      - name: Verify NumPy
        run: |
          uv run python - <<'PY'
          import numpy
          print("NumPy version:", numpy.__version__)
          print("NumPy path:", numpy.__file__)
          PY


      # -----------------------------
      # Clean Cython artifacts
      # -----------------------------
      - name: Clean Cython build
        run: |
          rm -rf build
          find . -name "*.so" -delete
          find . -name "*.c" -delete
          find . -name "*.cpp" -delete


      # -----------------------------
      # Build Cython extensions
      # -----------------------------
      - name: Build Cython extensions
        run: |
          uv run pip install -e .


      # -----------------------------
      # Verify compiled package
      # -----------------------------
      - name: Verify Cython import
        run: |
          uv run python - <<'PY'
          from scheduling_simulator.core import Cluster, Job, Machine
          print("Cython import OK")
          PY


      # -----------------------------
      # Run tests + coverage
      # -----------------------------
      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=scheduling_simulator \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html


      # -----------------------------
      # Upload HTML report
      # -----------------------------
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/


      # -----------------------------
      # GitHub Actions summary
      # -----------------------------
      - name: Generate coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both


      - name: Publish coverage summary
        run: |
          cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY


      # -----------------------------
      # Optional Codecov upload
      # -----------------------------
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
